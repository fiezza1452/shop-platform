name: Deploy to Ubuntu Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        id: deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/shop-platform
            git pull
            docker compose down
            docker compose up -d --build

      - name: Notify Line - Success
        if: success()
        run: |
          curl -X POST https://notify-api.line.me/api/notify \
            -H "Authorization: Bearer ${{ secrets.LINE_NOTIFY_TOKEN }}" \
            -d "message=✅ Deploy สำเร็จ! Branch: ${{ github.ref_name }} Commit: ${{ github.event.head_commit.message }}"

      - name: Notify Line - Failure
        if: failure()
        run: |
          curl -X POST https://notify-api.line.me/api/notify \
            -H "Authorization: Bearer ${{ secrets.LINE_NOTIFY_TOKEN }}" \
            -d "message=❌ Deploy ล้มเหลว! Branch: ${{ github.ref_name }} Commit: ${{ github.event.head_commit.message }}"
